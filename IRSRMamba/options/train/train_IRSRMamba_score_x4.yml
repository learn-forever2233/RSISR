# general settings for image SR training
name: train_IRSR_x4
model_type: MambaIRModel
scale: 4
num_gpu: auto
manual_seed: 3407
# dataset and data loader settings
datasets:
  train:
    name: M3FD
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/train/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/train/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk


    gt_size: 64
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4 # 16
    batch_size_per_gpu: 32  # 64
    dataset_enlarge_ratio: 10
    prefetch_mode: ~


  val_1:
    name: results-A
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/val/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/val/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk
      
      

      
# network structures
network_g:
  type: IRSRMamba
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  d_state: 16
  depths: [8, 8, 8, 8, 8, 8]
  embed_dim: 180
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~


# training settings
train:
  optim_g:
    type: Adam
    # lr: !!float 2e-4
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    # milestones: [ 250000, 400000, 450000, 475000 ]
    milestones: [5000, 10000, 15000, 20000, 25000, 30000, 35000]
    gamma: 0.5

  # total_iter: 500000
  total_iter: 250000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  # pixel_opt:
  #   type: SSM_L1Loss           
  #   weights: [1.0]             
  #   lambda_weight: 1.0         
  #   reduction: mean            
  #   aggregate_fn: mean  



# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      better: higher
      test_y_channel: true
      
    mse: # metric name, can be arbitrary
      type: calculate_mse
      crop_border: 4
      better: lower
      test_y_channel: true

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      better: higher
      crop_border: 4
      test_y_channel: true
    
    niqe:
      type: calculate_niqe
      crop_border: 4
      better: lower  # the lower, the better



# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
