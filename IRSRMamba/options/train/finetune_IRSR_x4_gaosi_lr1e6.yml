# general settings for image SR fine-tuning with Gaussian downsampling (optimized learning rate)
name: finetune_IRSR_x4_gaosi_lr1e6
model_type: MambaIRModel
scale: 4
num_gpu: auto
manual_seed: 3407

# dataset and data loader settings
datasets:
  train:
    name: train_gaosi
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train_gaosi/train/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train_gaosi/train/LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val_1:
    name: val_gaosi
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train_gaosi/val/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train_gaosi/val/LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: IRSRMamba
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  d_state: 16
  depths: [8, 8, 8, 8, 8, 8]
  embed_dim: 180
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /hpcfs/fhome/competitor01/lhx/IRSRMamba/experiments/train_IRSR_x4/models/net_g_50000.pth
  strict_load_g: true
  resume_state: ~

# training settings - 优化后的学习率策略
train:
  optim_g:
    type: Adam
    lr: !!float 1e-6  # 更小的初始学习率 (从 3e-6 降低)
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [15000, 30000, 50000, 70000]  # 延迟衰减点
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      better: higher
      test_y_channel: true
      
    mse: # metric name, can be arbitrary
      type: calculate_mse
      crop_border: 4
      better: lower
      test_y_channel: true

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 4
      better: higher
      test_y_channel: true

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
