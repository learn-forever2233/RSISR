# general settings for image SR fine-tuning with double branch training
name: finetune_IRSR_x4_double_branch
model_type: MambaIRModel
scale: 4
num_gpu: auto
manual_seed: 3407

# dataset and data loader settings
datasets:
  train:
    name: M3FD
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/train/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/train/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 16  # Reduced batch size for larger gt_size
    dataset_enlarge_ratio: 10
    prefetch_mode: ~

  val_1:
    name: results-A
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/val/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/IRSRMamba/score/train/train_processed_competition/val/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

# network structures
network_g:
  type: IRSRMamba
  upscale: 4
  in_chans: 3
  img_size: 128
  img_range: 1.
  d_state: 16
  depths: [8, 8, 8, 8, 8, 8]
  embed_dim: 180
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /hpcfs/fhome/competitor01/lhx/IRSRMamba/experiments/finetune_IRSR_x4_bicubic_perturb_15000/models/net_g_25000.pth
  strict_load_g: false
  resume_state: ~

# training settings - three-stage training
train:
  optim_g:
    type: Adam
    lr: !!float 3e-6
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingLR
    T_max: 25000
    eta_min: 1e-7

  total_iter: 25000  # Total iterations for three stages
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      better: higher
      test_y_channel: true
      
    mse: # metric name, can be arbitrary
      type: calculate_mse
      crop_border: 4
      better: lower
      test_y_channel: true

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 4
      better: higher
      test_y_channel: true

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500