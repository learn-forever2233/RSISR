# general settings
name: IRSR_tune
model_type: MambaIRModel
scale: 4
num_gpu: auto
manual_seed: 10

datasets:
  test_lr_only:  # 只使用 LR 图像的测试数据集
    name: LR_Only_Inference
    type: SingleImageDataset
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/val_LR_X4/X4  # 请修改为你的 LR 图像路径
    io_backend:
      type: disk

# network structures
network_g:
  type: IRSRMamba
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  d_state: 16
  depths: [8, 8, 8, 8, 8, 8]
  embed_dim: 180
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /hpcfs/fhome/competitor01/lhx/IRSRMamba/experiments/finetune_IRSR_x4/models/net_g_50000.pth  # 修改为你的模型路径
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: None  # add suffix to saved images, if None, use exp name

  # 只有 LR 图像时，可以关闭指标计算，或者如果有 GT 可以启用
  metrics: null
