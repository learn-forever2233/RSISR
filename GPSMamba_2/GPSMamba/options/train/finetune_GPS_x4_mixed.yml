# general settings for image SR fine-tuning (mixed bicubic and Gaussian data)
name: finetune_GPS_x4_mixed
model_type: MambaIRModel
scale: 4
num_gpu: auto
manual_seed: 3407

datasets:
  train:
    name: train_mixed
    type: MixedPairedImageDataset
    dataroot_gt_bicubic: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_processed_competition/train/HR
    dataroot_lq_bicubic: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_processed_competition/train/LR_bicubic/X4
    dataroot_gt_gaosi: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_gaosi/train/HR
    dataroot_lq_gaosi: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_gaosi/train/LR_bicubic/X4
    gaussian_prob: 0.2
    filename_tmpl_bicubic: '{}x4'
    filename_tmpl_gaosi: '{}'
    io_backend:
      type: disk

    gt_size: 32
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val_1:
    name: val_bicubic
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_processed_competition/val/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_processed_competition/val/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_2:
    name: val_gaosi
    type: PairedImageDataset
    dataroot_gt: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_gaosi/val/HR
    dataroot_lq: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/score/train/train_gaosi/val/LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: GPSMamba
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  embed_dim: 174
  d_state: 16
  depths: [8, 8, 8,8,8,8] 
  num_heads: [6,6,6,6,6,6] 
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2.
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

path:
  pretrain_network_g: /hpcfs/fhome/competitor01/lhx/GPSMamba_2/GPSMamba/experiments/finetune2_GPS_x4/models/net_g_15000.pth
  strict_load_g: true
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: !!float 3e-6
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [25000, 50000, 75000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      better: higher
      test_y_channel: true
      
    mse:
      type: calculate_mse
      crop_border: 4
      better: lower
      test_y_channel: true

    ssim:
      type: calculate_ssim
      crop_border: 4
      better: higher
      test_y_channel: true

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 2950
